name: BTAX Test CICD

on:
  schedule:
    - cron: '0 10 * * *' # every day at 00:00 UTC
  workflow_dispatch: {} # manual trigger

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Example step
        run: |
          echo "Daily run: $(date -u)"
          curl https://${{secrets.API_ENDPOINT}}/getPortfolio?key=${{secrets.API_KEY}}
